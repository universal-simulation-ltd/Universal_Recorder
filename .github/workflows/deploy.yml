# Auto-deploy Universal Recorder to its Cloudflare Pages project on every merge
# to main. The Pages project `universal-recorder` is Direct-Upload (not
# Git-connected), so this workflow does the `wrangler pages deploy` that would
# otherwise be a manual step.
#
# Auth: a CLOUDFLARE_API_TOKEN repo (or org) secret — the same token the
# opensource portal / assess-router deploys use. It carries "Cloudflare Pages:
# Edit" and "User Details: Read", so wrangler resolves the account on its own.
# Do NOT also pass CLOUDFLARE_ACCOUNT_ID: if the secret is unset it becomes an
# empty string and wrangler uses it literally, hitting /accounts// and failing.
name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents:    read
      deployments: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - name: Deploy to Cloudflare Pages
        if: ${{ env.CLOUDFLARE_API_TOKEN != '' }}
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken:        ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: '4'
          command:         pages deploy dist --project-name=universal-recorder --branch=main
